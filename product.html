<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Peça | Mimos Oliveira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Fraunces:wght@600;700&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-shell">
    <header class="subhero">
      <nav class="topbar">
        <a class="brand" href="index.html">
          <span class="brand-flower" aria-hidden="true">
            <svg class="brand-home-icon" viewBox="0 0 24 24" focusable="false">
              <path d="M3 11.5 12 4l9 7.5"></path>
              <path d="M5.5 10.5V20h13v-9.5"></path>
              <path d="M9.5 20v-5h5v5"></path>
            </svg>
          </span>
          <span class="brand-copy">
            <span class="brand-name">Mimos Oliveira</span>
            <span class="brand-tag" data-en="Handmade pieces made with care and delicate finishing by Ana Carvalho">Peças artesanais feitas com carinho e acabamento delicado por Ana Carvalho</span>
          </span>
        </a>
        <div class="nav-links">
          <a href="index.html" data-en="Home">Início</a>
          <a href="shop.html" data-en="Shop">Loja</a>
          <a href="about.html" data-en="About">Sobre</a>
          <a href="signup.html" class="nav-button" data-en="Sign up">Cadastre-se</a>
        </div>
      </nav>
    </header>

    <main class="page-main">
      <section class="product-detail-layout" id="product-detail">
        <div class="product-detail-media">
          <button class="zoom-button" id="zoom-toggle" type="button" data-en="Enlarge image">Ampliar imagem</button>
          <div class="product-detail-image-frame" id="zoom-frame">
            <img class="product-detail-image" id="product-detail-image" src="" alt="">
          </div>
        </div>

        <article class="product-detail-card">
          <p class="eyebrow" id="product-detail-category" data-en="Handmade piece">Peça artesanal</p>
          <h1 class="product-detail-title" id="product-detail-title" data-en="Product">Produto</h1>
          <p class="hero-text product-detail-text" id="product-detail-description"></p>
          <p class="product-detail-price" id="product-detail-price" data-en="Price on request">R$ sob consulta</p>
          <p class="product-detail-note" data-en="To confirm final price, availability, or personalization, contact the shop.">Para confirmar valor final, disponibilidade ou personalização, entre em contato pela loja.</p>
          <div class="hero-actions">
            <a class="primary-button" href="shop.html" data-en="Back To The Shop">Voltar Para A Loja</a>
          </div>
        </article>
      </section>
    </main>
  </div>

  <script src="product-data.js"></script>
  <script src="script.js"></script>
</body>
</html>
